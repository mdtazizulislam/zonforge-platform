<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - ZonForge</title>
<style>
body{font-family:Arial,sans-serif;max-width:980px;margin:40px auto;padding:0 16px;background:#020b12;color:#ddeeff}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px}
.actions{display:flex;gap:12px;flex-wrap:wrap}
button,a.button{padding:10px 14px;border:1px solid #00d4ff;border-radius:8px;background:#0b2a3a;color:#00d4ff;cursor:pointer;text-decoration:none}
.notice{display:none;margin-bottom:16px;padding:12px 14px;border-radius:10px}
.notice.ok{display:block;background:#123a22;border:1px solid #22c55e;color:#86efac}
.notice.err{display:block;background:#3a1616;border:1px solid #ef4444;color:#fca5a5}
.notice.info{display:block;background:#10283a;border:1px solid #0ea5e9;color:#bae6fd}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.card{background:#07141f;border:1px solid #0f2236;border-radius:14px;padding:18px}
.label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8daec4;margin-bottom:8px}
.value{font-size:28px;font-weight:700;color:#ddeeff}
.meta{font-size:14px;color:#8daec4;margin-top:8px}
.mono{font-family:'Courier New',monospace;font-size:12px;color:#8daec4;word-break:break-all}
</style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1 style="margin:0 0 6px;">Workspace Dashboard</h1>
      <p style="margin:0;color:#8daec4;">Live billing and subscription status for your ZonForge account.</p>
    </div>
    <div class="actions">
      <a class="button" href="/pricing">Pricing</a>
      <button id="logout-btn" type="button">Logout</button>
    </div>
  </div>

  <div id="notice" class="notice"></div>

  <div class="grid">
    <div class="card">
      <div class="label">Current Plan</div>
      <div id="plan" class="value">--</div>
      <div id="user-email" class="meta">Loading account…</div>
    </div>
    <div class="card">
      <div class="label">Billing Status</div>
      <div id="status" class="value">--</div>
      <div id="renewal" class="meta">Checking renewal window…</div>
    </div>
    <div class="card">
      <div class="label">Stripe Customer</div>
      <div id="customer" class="mono">--</div>
      <div id="subscription" class="meta">Subscription ID pending…</div>
    </div>
  </div>

<script>
const API_BASE = (localStorage.getItem('zonforge_api_base') || window.ZONFORGE_API_BASE || 'https://api.zonforge.com').replace(/\/$/, '');
const TOKEN_KEY = 'zonforge_access_token';
const token = localStorage.getItem(TOKEN_KEY);
const params = new URLSearchParams(window.location.search);

function showNotice(text, type) {
  const notice = document.getElementById('notice');
  notice.className = `notice ${type}`;
  notice.textContent = text;
}

async function authFetch(path) {
  return fetch(`${API_BASE}${path}`, {
    headers: {
      Authorization: `Bearer ${token}`,
    },
    credentials: 'include',
  });
}

function requireSession() {
  if (!token) {
    window.location.href = `/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
    return false;
  }
  return true;
}

async function loadDashboard() {
  if (!requireSession()) {
    return;
  }

  const [userResp, subResp] = await Promise.all([
    authFetch('/v1/users'),
    authFetch('/v1/billing/subscription'),
  ]);

  if (userResp.status === 401 || subResp.status === 401) {
    localStorage.removeItem(TOKEN_KEY);
    window.location.href = `/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
    return;
  }

  const userPayload = await userResp.json().catch(() => ({}));
  const subPayload = await subResp.json().catch(() => ({}));
  if (!userResp.ok || !subResp.ok) {
    showNotice(subPayload?.error || userPayload?.error || 'Could not load dashboard state.', 'err');
    return;
  }

  const user = userPayload?.user || {};
  const subscription = subPayload?.subscription || {};
  const planCode = String(subscription.planCode || 'starter').toUpperCase();
  const status = String(subscription.status || 'inactive').toUpperCase();

  document.getElementById('plan').textContent = planCode;
  document.getElementById('status').textContent = status;
  document.getElementById('user-email').textContent = user.email || 'Authenticated account';
  document.getElementById('customer').textContent = subscription.stripeCustomerId || 'Not attached yet';
  document.getElementById('subscription').textContent = subscription.stripeSubscriptionId || 'Subscription ID pending';
  document.getElementById('renewal').textContent = subscription.currentPeriodEnd
    ? `Renews ${new Date(subscription.currentPeriodEnd).toLocaleString()}`
    : 'Renewal date pending';

  if (params.get('payment') === 'success') {
    showNotice(`Payment completed. Your workspace is now on ${planCode}.`, 'ok');
  }
}

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  window.location.href = '/login';
});

loadDashboard().catch((error) => {
  showNotice(error instanceof Error ? error.message : 'Could not load dashboard.', 'err');
});
</script>
</body>
</html>
