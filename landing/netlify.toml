# ZonForge Sentinel — Netlify Configuration
# Landing page + React SPA (web-dashboard)

[build]
  publish = "."
  command = "cd ../apps/web-dashboard && npm install --legacy-peer-deps && npx vite build"

[build.environment]
  VITE_API_URL = "/api"
  NODE_VERSION = "20"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# demo.html — no caching (AI content changes)
[[headers]]
  for = "/demo.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Route handling lives in landing/_redirects so authenticated SPA paths resolve
# to /app/index.html while marketing pages continue to serve from landing/.
