# ZonForge Sentinel — Netlify Configuration
# Landing page + React SPA (web-dashboard)

[build]
  publish = "."
  command = "cd ../apps/web-dashboard && npm install --legacy-peer-deps && npx vite build"

[build.environment]
  VITE_API_URL = "https://api.zonforge.com"
  NODE_VERSION = "20"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# demo.html — no caching (AI content changes)
[[headers]]
  for = "/demo.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# SPA routes — handled by _redirects (which takes precedence over toml rules)
# Keeping toml redirects minimal to avoid conflicts with _redirects file

[[redirects]]
  from   = "/signup"
  to     = "/signup.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
