<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - ZonForge</title>
<style>
body{font-family:Arial,sans-serif;max-width:520px;margin:40px auto;padding:0 16px;background:#020b12;color:#ddeeff}
label{display:block;margin:12px 0 6px}
input{width:100%;padding:10px;border:1px solid #0f2236;border-radius:6px;background:#07141f;color:#ddeeff}
button{margin-top:16px;padding:10px 14px;border:1px solid #00d4ff;border-radius:6px;background:#0b2a3a;color:#00d4ff;cursor:pointer}
.notice{margin-top:12px;padding:10px;border-radius:6px;display:none}
.notice.ok{display:block;background:#123a22;border:1px solid #22c55e;color:#86efac}
.notice.err{display:block;background:#3a1616;border:1px solid #ef4444;color:#fca5a5}
small,a{color:#8daec4}
</style>
</head>
<body>
  <h1>Create Account</h1>
  <p>Register against production API.</p>

  <form id="signup-form">
    <label for="email">Email</label>
    <input id="email" type="email" required placeholder="you@company.com" />

    <label for="password">Password</label>
    <input id="password" type="password" required placeholder="At least 8 chars" />

    <button type="submit">Create Account</button>
    <div id="notice" class="notice"></div>
  </form>

  <p><small>Already have an account? <a href="/login">Sign In</a></small></p>

<script>
const API_BASE = (localStorage.getItem('zonforge_api_base') || window.ZONFORGE_API_BASE || 'https://api.zonforge.com').replace(/\/$/, '');
const TOKEN_KEY = 'zonforge_access_token';
const params = new URLSearchParams(window.location.search);
const checkoutPlan = params.get('checkout_plan');
const billingCycle = params.get('billing_cycle') === 'annual' ? 'annual' : 'monthly';
const nextPath = params.get('next') || '/dashboard';

const loginLink = document.querySelector('a[href="/login"]');
if (loginLink && window.location.search) {
  loginLink.href = `/login${window.location.search}`;
}

function showNotice(text, type) {
  const notice = document.getElementById('notice');
  notice.className = `notice ${type}`;
  notice.textContent = text;
}

async function resumeCheckout(token) {
  if (!checkoutPlan || !token) {
    return false;
  }

  showNotice('Account created. Starting secure checkout...', 'ok');
  const resp = await fetch(`${API_BASE}/v1/billing/checkout`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`,
    },
    credentials: 'include',
    body: JSON.stringify({
      plan_id: checkoutPlan,
      billing_cycle: billingCycle,
    }),
  });

  const payload = await resp.json().catch(() => ({}));
  if (!resp.ok) {
    throw new Error(payload?.error || `Checkout failed (${resp.status})`);
  }

  const sessionUrl = payload?.session_url || payload?.url;
  if (!sessionUrl) {
    throw new Error('Checkout session URL was missing from the response.');
  }

  window.location.href = sessionUrl;
  return true;
}

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const resp = await fetch(`${API_BASE}/v1/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });

    const payload = await resp.json().catch(() => ({}));
    if (!resp.ok) {
      showNotice(payload?.error || payload?.detail || `Registration failed (${resp.status})`, 'err');
      return;
    }

    const token = payload?.access_token || payload?.token || payload?.data?.accessToken;
    if (token) {
      localStorage.setItem(TOKEN_KEY, token);
    }

    if (await resumeCheckout(token)) {
      return;
    }

    showNotice('Account created successfully. Redirecting...', 'ok');
    setTimeout(() => { window.location.href = nextPath; }, 500);
  } catch (err) {
    showNotice(err instanceof Error ? err.message : 'Request failed', 'err');
  }
});
</script>
</body>
</html>
