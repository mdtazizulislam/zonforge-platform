### ── ZonForge Sentinel — nginx production config ───────────────
### Place at /etc/nginx/sites-available/zonforge and symlink to sites-enabled

upstream api_gateway {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream web_dashboard {
    server 127.0.0.1:5173;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.zonforge.com api.zonforge.com;
    return 301 https://$server_name$request_uri;
}

# Main app server (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.zonforge.com;

    # TLS (use certbot: certbot --nginx -d app.zonforge.com)
    ssl_certificate     /etc/letsencrypt/live/app.zonforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.zonforge.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:; connect-src 'self' api.zonforge.com;" always;

    # Web Dashboard (React SPA)
    location / {
        proxy_pass http://web_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# API server (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.zonforge.com;

    ssl_certificate     /etc/letsencrypt/live/api.zonforge.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zonforge.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # CORS
    add_header Access-Control-Allow-Origin  "https://app.zonforge.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;

    # Rate limits
    location /v1/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://api_gateway;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SAML/SCIM (SSO service pass-through)
    location /saml/ {
        proxy_pass http://127.0.0.1:3024;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /scim/ {
        proxy_pass http://127.0.0.1:3024;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
