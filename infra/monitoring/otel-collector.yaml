# ─────────────────────────────────────────────────────────────────
# ZonForge Sentinel — Observability Stack
# OpenTelemetry Collector + Jaeger
# ─────────────────────────────────────────────────────────────────

# ── OTEL Collector ConfigMap ──────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Prometheus metrics from services
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector
              static_configs:
                - targets: [localhost:8888]

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      # Add resource attributes
      resource:
        attributes:
          - key: deployment.environment
            value: production
            action: upsert

      # Memory limiter — prevent OOM
      memory_limiter:
        check_interval: 5s
        limit_mib: 512
        spike_limit_mib: 128

      # Filter out health check spans
      filter:
        spans:
          exclude:
            match_type: strict
            attributes:
              - key: http.url
                value: /health
              - key: http.url
                value: /metrics

    exporters:
      # Jaeger for traces
      jaeger:
        endpoint: jaeger:14250
        tls:
          insecure: true

      # Prometheus for metrics
      prometheus:
        endpoint: 0.0.0.0:8889

      # Logging for debug
      logging:
        loglevel: warn

    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, resource, filter, batch]
          exporters:  [jaeger, logging]

        metrics:
          receivers:  [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters:  [prometheus]

---

# ── OTEL Collector Deployment ─────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name:      otel-collector
    app.kubernetes.io/component: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.99.0
          args:
            - --config=/etc/otel/collector.yaml
          ports:
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP
            - containerPort: 8888   # Internal metrics
            - containerPort: 8889   # Prometheus exporter
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health/ready, port: 13133 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: 13133 }
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

---

apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889

---

# ── Jaeger All-In-One (dev) / Production: Jaeger Operator ────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.57
          ports:
            - containerPort: 16686   # UI
            - containerPort: 14250   # gRPC collector
            - containerPort: 14268   # HTTP collector
          env:
            - name: SPAN_STORAGE_TYPE
              value: elasticsearch   # prod: use ES for persistence
            - name: ES_SERVER_URLS
              value: http://elasticsearch:9200
            - name: JAEGER_DISABLED
              value: "false"
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }

---

apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: ui
      port: 16686
    - name: grpc
      port: 14250
    - name: http
      port: 14268
