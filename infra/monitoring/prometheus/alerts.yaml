groups:

  # ─────────────────────────────────────────────────────────────────
  # SLO ALERTS — Service Level Objectives
  # ─────────────────────────────────────────────────────────────────

  - name: zonforge.slo
    rules:

    # API Gateway error rate > 1% for 5 minutes
    - alert: ApiGatewayHighErrorRate
      expr: |
        (
          rate(http_requests_total{
            job="api-gateway",
            status_code=~"5.."
          }[5m])
          /
          rate(http_requests_total{job="api-gateway"}[5m])
        ) > 0.01
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "API gateway error rate above 1%"
        description: >
          API gateway is returning {{ printf "%.1f" (mul $value 100) }}% errors
          over the last 5 minutes. SLO breach if sustained above 0.5%.
        runbook_url: "https://docs.zonforge.com/runbooks/api-gateway-errors"

    # API Gateway p99 latency > 2s
    - alert: ApiGatewayHighLatency
      expr: |
        histogram_quantile(0.99,
          rate(http_request_duration_seconds_bucket{job="api-gateway"}[5m])
        ) > 2.0
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "API gateway p99 latency > 2s"
        description: >
          API gateway p99 latency is {{ printf "%.2f" $value }}s.
          SLO target is 500ms p99.
        runbook_url: "https://docs.zonforge.com/runbooks/api-latency"

    # Ingestion service availability
    - alert: IngestionServiceDown
      expr: up{job="ingestion-service"} == 0
      for: 1m
      labels:
        severity: critical
        team: platform
        pagerduty: "true"
      annotations:
        summary: "Ingestion service is down"
        description: "ZonForge ingestion service has been down for > 1 minute. Events are not being collected."
        runbook_url: "https://docs.zonforge.com/runbooks/ingestion-down"

  # ─────────────────────────────────────────────────────────────────
  # PIPELINE HEALTH ALERTS
  # ─────────────────────────────────────────────────────────────────

  - name: zonforge.pipeline
    rules:

    # BullMQ raw-events queue depth too high (>10K waiting)
    - alert: RawEventsQueueDepthHigh
      expr: zonforge_queue_waiting{queue="zf:raw-events"} > 10000
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Raw events queue depth critical: {{ $value }} jobs waiting"
        description: >
          The raw-events BullMQ queue has {{ $value }} waiting jobs.
          Normalization workers may be overwhelmed or down.
        runbook_url: "https://docs.zonforge.com/runbooks/queue-depth"

    # Normalization lag > 5 minutes
    - alert: NormalizationPipelineLag
      expr: zonforge_queue_lag_ms{queue="zf:raw-events"} > 300000
      for: 3m
      labels:
        severity: critical
        team: platform
        pagerduty: "true"
      annotations:
        summary: "Normalization pipeline SLO BREACH — lag {{ $value | humanizeDuration }}"
        description: >
          Events are taking >5 minutes to normalize. Detection is delayed.
          SLO: 2-minute normalization lag.
        runbook_url: "https://docs.zonforge.com/runbooks/normalization-lag"

    # DLQ has messages
    - alert: DeadLetterQueueNonEmpty
      expr: zonforge_queue_waiting{queue=~"zf:dlq:.*"} > 0
      for: 1m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Dead letter queue {{ $labels.queue }} has {{ $value }} messages"
        description: >
          Events have failed max retries and are in the DLQ.
          These events will NOT be detected/correlated without manual intervention.
        runbook_url: "https://docs.zonforge.com/runbooks/dlq-messages"

    # Failed jobs rate high
    - alert: HighJobFailureRate
      expr: zonforge_queue_failed{queue="zf:raw-events"} > 100
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "High job failure rate in {{ $labels.queue }}"
        description: "{{ $value }} failed jobs in the last observation period."

    # Detection engine signals dropping to zero (possible outage)
    - alert: DetectionEngineNoSignals
      expr: rate(zonforge_detection_signals_total[30m]) == 0
      for: 15m
      labels:
        severity: critical
        team: security
        pagerduty: "true"
      annotations:
        summary: "Detection engine producing no signals for 15+ minutes"
        description: >
          No detection signals have been emitted in 15 minutes.
          This may indicate the detection engine is down or no events are flowing.
        runbook_url: "https://docs.zonforge.com/runbooks/detection-silent"

  # ─────────────────────────────────────────────────────────────────
  # SECURITY ALERTS
  # ─────────────────────────────────────────────────────────────────

  - name: zonforge.security
    rules:

    # Auth service high login failure rate (possible credential stuffing)
    - alert: HighLoginFailureRate
      expr: |
        rate(zonforge_auth_login_failures_total[5m]) > 10
      for: 2m
      labels:
        severity: warning
        team: security
      annotations:
        summary: "High login failure rate: {{ $value | printf \"%.1f\" }}/s"
        description: >
          The auth service is seeing an elevated login failure rate.
          This may indicate a credential stuffing or brute force attack.
        runbook_url: "https://docs.zonforge.com/runbooks/auth-brute-force"

    # HMAC signature validation failures (possible forged requests)
    - alert: HmacSignatureFailures
      expr: rate(zonforge_ingestion_signature_failures_total[5m]) > 5
      for: 2m
      labels:
        severity: warning
        team: security
      annotations:
        summary: "Ingestion HMAC signature failures: {{ $value | printf \"%.1f\" }}/s"
        description: >
          Collector events are failing HMAC signature validation.
          May indicate spoofed requests or misconfigured collectors.

    # Rate limit exceeded frequently
    - alert: RateLimitExceededHigh
      expr: rate(zonforge_rate_limit_exceeded_total[5m]) > 20
      for: 5m
      labels:
        severity: info
        team: platform
      annotations:
        summary: "Rate limit exceeded {{ $value | printf \"%.0f\" }} times/min"
        description: >
          Many clients are hitting rate limits. Possible abuse or
          misconfigured integration.

    # Audit chain integrity violation
    - alert: AuditChainIntegrityViolation
      expr: zonforge_audit_chain_violations_total > 0
      for: 0m
      labels:
        severity: critical
        team: security
        pagerduty: "true"
      annotations:
        summary: "🚨 AUDIT LOG CHAIN INTEGRITY VIOLATION DETECTED"
        description: >
          The SHA-256 hash chain of the audit log has been broken.
          This indicates tampering with audit records.
          IMMEDIATE FORENSIC INVESTIGATION REQUIRED.
        runbook_url: "https://docs.zonforge.com/runbooks/audit-chain-violation"

  # ─────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE ALERTS
  # ─────────────────────────────────────────────────────────────────

  - name: zonforge.infrastructure
    rules:

    # Node memory > 90%
    - alert: NodeMemoryHigh
      expr: |
        (
          node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes
        ) / node_memory_MemTotal_bytes > 0.90
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Node {{ $labels.instance }} memory at {{ printf \"%.0f\" (mul $value 100) }}%"

    # Node disk > 80%
    - alert: NodeDiskSpaceLow
      expr: |
        (
          node_filesystem_size_bytes{mountpoint="/"}
          - node_filesystem_free_bytes{mountpoint="/"}
        ) / node_filesystem_size_bytes{mountpoint="/"} > 0.80
      for: 10m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Node {{ $labels.instance }} disk at {{ printf \"%.0f\" (mul $value 100) }}%"
        runbook_url: "https://docs.zonforge.com/runbooks/disk-space"

    # Pod OOMKilled
    - alert: PodOOMKilled
      expr: |
        kube_pod_container_status_last_terminated_reason{
          namespace="zonforge",
          reason="OOMKilled"
        } == 1
      for: 0m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} OOMKilled"
        description: >
          Container {{ $labels.container }} was killed due to OOM.
          Consider increasing memory limits.

    # Pod restart loop
    - alert: PodCrashLooping
      expr: |
        rate(kube_pod_container_status_restarts_total{namespace="zonforge"}[15m]) > 0
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Pod {{ $labels.pod }} is crash-looping"
        description: >
          {{ $labels.container }} in {{ $labels.pod }} has restarted
          {{ $value | printf \"%.0f\" }} times in the last 15 minutes.

    # PostgreSQL connection pool exhausted
    - alert: PostgresConnectionsHigh
      expr: |
        pg_stat_activity_count{state="active"} /
        pg_settings_max_connections > 0.80
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "PostgreSQL connections at {{ printf \"%.0f\" (mul $value 100) }}% capacity"
        runbook_url: "https://docs.zonforge.com/runbooks/postgres-connections"

    # Redis memory > 80%
    - alert: RedisMemoryHigh
      expr: |
        redis_memory_used_bytes / redis_memory_max_bytes > 0.80
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Redis memory usage at {{ printf \"%.0f\" (mul $value 100) }}%"

  # ─────────────────────────────────────────────────────────────────
  # BUSINESS METRIC ALERTS
  # ─────────────────────────────────────────────────────────────────

  - name: zonforge.business
    rules:

    # Connector health degraded
    - alert: ConnectorHealthDegraded
      expr: |
        (
          sum(zonforge_connectors_healthy_total) /
          sum(zonforge_connectors_total)
        ) < 0.70
      for: 10m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Connector health below 70%: {{ printf \"%.0f\" (mul $value 100) }}% healthy"
        description: >
          More than 30% of configured data connectors are unhealthy.
          Detection coverage is degraded.

    # MTTD SLA breaching
    - alert: MttdSlaBreaching
      expr: zonforge_mttd_sla_breaches_total > 5
      for: 5m
      labels:
        severity: warning
        team: security
      annotations:
        summary: "{{ $value }} alerts have breached MTTD SLA"
        description: >
          Multiple open alerts have exceeded their MTTD SLA targets.
          Detection pipeline may be delayed.

    # Threat intel feed stale (>8 hours)
    - alert: ThreatIntelFeedStale
      expr: |
        (time() - zonforge_threat_intel_last_refresh_timestamp) > 28800
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Threat intel feeds haven't refreshed in {{ $value | humanizeDuration }}"
        description: >
          IOC data may be stale. Check threat-intel-service logs
          for feed refresh failures.
