scenario: credential_attack
version: "1.0"
name: "Credential Brute Force → Account Takeover"
description: >
  Simulates a credential stuffing attack where an adversary submits
  multiple failed logins from a single IP then achieves success.
  Classic account takeover precursor pattern.
mitre_tactics:
  - TA0006   # Credential Access
  - TA0001   # Initial Access
mitre_techniques:
  - T1110    # Brute Force
  - T1078    # Valid Accounts
severity: high
expected_detections:
  - ZF-AUTH-001    # brute-force-to-success rule
category: credential

# ── Simulation steps ────────────────────────────────────────────
steps:
  - step: 1
    name: failed_login_burst
    event_type: user_login_failed
    count: 15
    delay_ms: 200
    params:
      actor_ip:      "203.0.113.42"
      actor_country: "CN"
      source_type:   "m365_entra"
    description: "15 rapid failed logins from foreign IP"

  - step: 2
    name: successful_login
    event_type: user_login_success
    count: 1
    delay_ms: 500
    params:
      actor_ip:      "203.0.113.42"
      actor_country: "CN"
      source_type:   "m365_entra"
    description: "Login succeeds after brute-force"

  - step: 3
    name: immediate_data_access
    event_type: file_access
    count: 5
    delay_ms: 300
    params:
      actor_ip:      "203.0.113.42"
      source_type:   "m365_entra"
      sensitivity:   "high"
    description: "Immediate sensitive file access post-login"

# ── Evaluation criteria ─────────────────────────────────────────
evaluation:
  require_alert:       true
  require_severity:    ["high", "critical"]
  detection_window_ms: 30000
  pass_threshold_pct:  80
