# ZonForge Sentinel — Netlify config for landing-web
[build]
  base    = "apps/landing-web"
  command = "npm run build"
  publish = "apps/landing-web/dist"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=3600"

# Demo page — no caching (live AI content)
[[headers]]
  for = "/demo.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Redirect /app to dashboard
[[redirects]]
  from   = "/app"
  to     = "https://app.zonforge.com"
  status = 301
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
