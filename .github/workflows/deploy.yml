name: Build → Push → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, staging]
      service:
        description: Service to deploy (leave empty for all)
        required: false
        type: string

env:
  AWS_REGION:    us-east-1
  ECR_REGISTRY:  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  NODE_VERSION:  "20"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # DETECT CHANGED SERVICES
  # ─────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth-service:       ${{ steps.filter.outputs.auth-service }}
      tenant-service:     ${{ steps.filter.outputs.tenant-service }}
      ingestion-service:  ${{ steps.filter.outputs.ingestion-service }}
      detection-engine:   ${{ steps.filter.outputs.detection-engine }}
      alert-service:      ${{ steps.filter.outputs.alert-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'apps/auth-service/**'
              - 'packages/**'
            tenant-service:
              - 'apps/tenant-service/**'
              - 'packages/**'
            ingestion-service:
              - 'apps/ingestion-service/**'
              - 'packages/**'
            detection-engine:
              - 'apps/detection-engine/**'
              - 'packages/**'
            alert-service:
              - 'apps/alert-service/**'
              - 'packages/**'

  # ─────────────────────────────────────────────────────────────────
  # BUILD + PUSH IMAGES
  # ─────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs[matrix.service] == 'true' ||
      github.event.inputs.service == matrix.service ||
      github.event.inputs.service == ''
    strategy:
      matrix:
        service:
          - auth-service
          - tenant-service
      fail-fast: false

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/zonforge/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       ./apps/${{ matrix.service }}/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true
          sbom:       true

      - name: Sign image with Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/zonforge/${{ matrix.service }}:sha-${{ github.sha }}"
          cosign sign --yes $IMAGE

      - name: Scan image with Trivy
          uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/zonforge/${{ matrix.service }}:sha-${{ github.sha }}
          format:    sarif
          output:    trivy-results.sarif
          severity:  CRITICAL,HIGH
          exit-code: "1"   # Fail on critical CVEs

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────
  # DEPLOY TO DEV (ArgoCD GitOps)
  # ─────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: dev
      url: https://app.zonforge.com/dev

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tags in Helm values
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          for SERVICE in auth-service tenant-service; do
            VALUES_FILE="infra/helm/charts/${SERVICE}/values.yaml"
            if [ -f "$VALUES_FILE" ]; then
              sed -i "s|tag: .*|tag: \"sha-${SHORT_SHA}\"|g" "$VALUES_FILE"
              echo "Updated $SERVICE to sha-${SHORT_SHA}"
            fi
          done

      - name: Commit and push GitOps update
        run: |
          git config user.name  "ZonForge CI"
          git config user.email "ci@zonforge.com"
          git add infra/helm/
          git commit -m "chore(deploy): update image tags to sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push

      # ArgoCD will automatically detect the Git change and sync

  # ─────────────────────────────────────────────────────────────────
  # GENERATE SBOM
  # ─────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path:            .
          format:          spdx-json
          artifact-name:   sbom-${{ github.sha }}.spdx.json
          output-file:     sbom.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name:            sbom-${{ github.sha }}
          path:            sbom.spdx.json
          retention-days:  90
