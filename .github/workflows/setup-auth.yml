name: ZonForge Auth Setup
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}

      - name: Write all files
        run: bash <(curl -sL https://raw.githubusercontent.com/mdtazizulislam/zonforge-platform/main/.github/scripts/setup-auth.sh)

      - name: Commit and push
        run: |
          git config user.name "ZonForge Bot"
          git config user.email "bot@zonforge.dev"
          git add .
          git diff --staged --quiet || git commit -m "feat: auth system + three portals + RBAC + DB schema"
          git push
