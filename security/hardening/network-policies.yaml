# ─────────────────────────────────────────────────────────────────
# ZonForge Sentinel — Kubernetes NetworkPolicies
#
# Defense-in-depth: NetworkPolicy + Istio AuthorizationPolicy.
# NetworkPolicy operates at L3/L4 (IP/port).
# Istio AuthorizationPolicy operates at L7 (HTTP/mTLS identity).
# ─────────────────────────────────────────────────────────────────

# ── Default: deny all ingress/egress in namespace ─────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: zonforge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---

# ── Allow: DNS resolution (port 53) ──────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: zonforge
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---

# ── Allow: API Gateway receives traffic from ALB ──────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-ingress
  namespace: zonforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: aws-load-balancer-controller
      ports:
        - port: 3000
          protocol: TCP

---

# ── Allow: Inter-service traffic within zonforge namespace ────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: zonforge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: zonforge
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: zonforge

---

# ── Allow: Services → AWS RDS (PostgreSQL 5432) ───────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress
  namespace: zonforge
spec:
  podSelector:
    matchLabels:
      needs-postgres: "true"
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 5432
          protocol: TCP

---

# ── Allow: Services → AWS ElastiCache (Redis 6379) ────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-egress
  namespace: zonforge
spec:
  podSelector:
    matchLabels:
      needs-redis: "true"
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6379
          protocol: TCP

---

# ── Allow: Services → ClickHouse (8123/9000) ──────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-clickhouse-egress
  namespace: zonforge
spec:
  podSelector:
    matchLabels:
      needs-clickhouse: "true"
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 8123
          protocol: TCP
        - port: 9000
          protocol: TCP

---

# ── Allow: Collectors → external HTTPS (443) ─────────────────────
# Collectors need to call Microsoft Graph, AWS, Google APIs

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-collector-external-https
  namespace: zonforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: collector
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP

---

# ── Allow: Prometheus scraping metrics ports ──────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: zonforge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
          protocol: TCP
        - port: 3001
          protocol: TCP
        - port: 3002
          protocol: TCP
        - port: 3003
          protocol: TCP
        - port: 3004
          protocol: TCP
        - port: 3005
          protocol: TCP
