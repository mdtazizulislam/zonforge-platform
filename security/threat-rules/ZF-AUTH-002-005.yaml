# ─────────────────────────────────────────────────────────────────
# ZF-AUTH-005: MFA Bypass / Challenge Not Satisfied
# ─────────────────────────────────────────────────────────────────
id: ZF-AUTH-005
name: MFA Bypass Detected
description: >
  A successful login occurs without MFA being satisfied, or an
  MFA challenge is repeatedly denied and then bypassed.
  This may indicate a push-bombing (MFA fatigue) attack or
  conditional access policy misconfiguration.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0006
      name: Credential Access
  techniques:
    - id: T1621
      name: Multi-Factor Authentication Request Generation
    - id: T1556
      name: Modify Authentication Process
      sub_techniques:
        - id: T1556.006
          name: Multi-Factor Authentication
  coverage_level: full

source_types: [m365_entra, google_workspace]
event_categories: [authentication]

detection:
  type: sequence
  window_minutes: 30
  group_by: [actor_user_id]

  steps:
    - name: mfa_challenges
      conditions:
        - field: event_action
          operator: in
          value: [mfa_challenge, login_challenge, 2SV_DISABLE,
                  multiple_failed_mfa, FAILED_MFA]
      aggregate:
        count_min: 3
      within_minutes: 20

    - name: successful_login
      conditions:
        - field: event_action
          operator: in
          value: [login_success]
        - field: outcome
          operator: eq
          value: success
      must_follow: mfa_challenges

alert:
  title: "MFA Bypass — Possible Push Bombing — {{actor_user_id}}"
  description: >
    User {{actor_user_id}} had {{mfa_challenges.count}} MFA challenges
    followed by a successful login. This pattern is consistent with
    an MFA fatigue (push bombing) attack.
  priority: P1
  recommended_actions:
    - "Contact user immediately — did they approve the final MFA request?"
    - "If user did not approve, treat as active compromise"
    - "Revoke all sessions and reset credentials immediately"
    - "Review conditional access policies for MFA bypass vectors"

confidence_score: 0.88
false_positive_notes: "Users who accidentally approve after multiple denials. Low frequency expected."
