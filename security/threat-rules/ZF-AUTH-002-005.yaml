# ─────────────────────────────────────────────────────────────────
# ZF-AUTH-004: Off-Hours Admin Action
# ─────────────────────────────────────────────────────────────────
id: ZF-AUTH-004
name: Privileged Action Outside Business Hours
description: >
  A privileged user performs sensitive administrative actions
  outside declared business hours (default: outside 07:00-19:00
  local time on weekdays). Insider threats and attackers using
  compromised admin accounts often operate at night to avoid detection.
severity: medium
enabled: true

mitre:
  tactics:
    - id: TA0003
      name: Persistence
    - id: TA0006
      name: Credential Access
  techniques:
    - id: T1078
      name: Valid Accounts
  coverage_level: partial

source_types: [m365_entra, aws_cloudtrail, google_workspace]
event_categories: [account_management, authentication]

detection:
  type: threshold
  window_minutes: 60
  group_by: [actor_user_id]

  conditions:
    - field: actor_user_type
      operator: in
      value: [admin]
    - field: event_action
      operator: in
      value: [GRANT_ADMIN_PRIVILEGE, AttachRolePolicy, CreateUser,
              DeleteUser, PutRolePolicy, CreateAccessKey,
              admin_created_new_admin, privilege_escalation]
    - field: is_outside_business_hours
      operator: eq
      value: true
  count_min: 1

alert:
  title: "Off-Hours Privileged Action — {{actor_user_id}}"
  description: >
    Admin {{actor_user_id}} performed {{event_action}} at
    {{event_time}} (outside business hours).
  priority: P3
  recommended_actions:
    - "Verify this action was authorized and expected"
    - "Review the full session activity around this event"
    - "If unauthorized, reverse the action and investigate"

confidence_score: 0.70
false_positive_notes: "On-call engineers and operations in different time zones will trigger this frequently. Tune business hours per tenant."

