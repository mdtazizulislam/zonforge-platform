# ─────────────────────────────────────────────────────────────────
# ZF-AUTH-002: Impossible Travel Login
# ─────────────────────────────────────────────────────────────────
id: ZF-AUTH-002
name: Impossible Travel Login
description: >
  Two successful logins from the same user from geographically
  impossible locations — the distance and time gap makes physical
  travel impossible, indicating credential compromise.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0001
      name: Initial Access
  techniques:
    - id: T1078
      name: Valid Accounts
      sub_techniques:
        - id: T1078.004
          name: Cloud Accounts
  coverage_level: full

source_types: [m365_entra, google_workspace, aws_cloudtrail]
event_categories: [authentication]

detection:
  type: correlation
  window_minutes: 120
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [login_success]
    - field: outcome
      operator: eq
      value: success

  correlation_check:
    type: geo_impossible_travel
    min_distance_km: 500
    require_distinct_countries: true
    min_events: 2

alert:
  title: "Impossible Travel Detected — {{actor_user_id}}"
  description: >
    User {{actor_user_id}} logged in from {{country_1}} and
    {{country_2}} within {{time_gap_minutes}} minutes.
    Physical travel between these locations is impossible in this time.
  priority: P1
  recommended_actions:
    - "Immediately contact the user through an out-of-band channel"
    - "Suspend user session pending verification"
    - "Review all actions performed in both sessions"
    - "If confirmed compromise, reset credentials and revoke all sessions"

confidence_score: 0.95
false_positive_notes: "VPN or proxy usage can trigger this. Check if user commonly uses VPN."

