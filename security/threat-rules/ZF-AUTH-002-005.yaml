# ─────────────────────────────────────────────────────────────────
# ZF-AUTH-003: Dormant Admin Account Suddenly Active
# ─────────────────────────────────────────────────────────────────
id: ZF-AUTH-003
name: Dormant Admin Account Suddenly Active
description: >
  A privileged account that has been inactive for 90+ days
  suddenly becomes active, especially during off-hours.
  This pattern may indicate account takeover of a forgotten
  admin account or insider threat activity.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0003
      name: Persistence
    - id: TA0004
      name: Privilege Escalation
  techniques:
    - id: T1078
      name: Valid Accounts
      sub_techniques:
        - id: T1078.004
          name: Cloud Accounts
  coverage_level: full

source_types: [m365_entra, google_workspace, aws_cloudtrail]
event_categories: [authentication, account_management]

detection:
  type: threshold
  window_minutes: 60
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [login_success, AssumeRole, GRANT_ADMIN_PRIVILEGE]
    - field: actor_user_type
      operator: in
      value: [admin]
    - field: days_since_last_activity
      operator: gte
      value: 90

alert:
  title: "Dormant Admin Account Active — {{actor_user_id}}"
  description: >
    Admin account {{actor_user_id}} became active after
    {{days_since_last_activity}} days of inactivity.
  priority: P2
  recommended_actions:
    - "Verify account ownership — contact the account owner directly"
    - "Review all actions taken since account activation"
    - "Check if account was recently added to privileged groups"
    - "Consider disabling dormant privileged accounts not in use"

confidence_score: 0.82
false_positive_notes: "Returning employees or accounts activated for specific projects."

