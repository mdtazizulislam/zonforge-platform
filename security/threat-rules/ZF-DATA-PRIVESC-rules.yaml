# ZF-PRIVESC-001: Cloud Privilege Escalation
id: ZF-PRIVESC-001
name: Cloud Privilege Escalation Detected
description: >
  A user or service assigns elevated permissions to themselves
  or another entity, particularly attaching administrative policies
  or creating new admin accounts. A core indicator of privilege
  escalation in cloud environments.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0004
      name: Privilege Escalation
    - id: TA0003
      name: Persistence
  techniques:
    - id: T1098
      name: Account Manipulation
      sub_techniques:
        - id: T1098.001
          name: Additional Cloud Credentials
    - id: T1078
      name: Valid Accounts
  coverage_level: full

source_types: [aws_cloudtrail, m365_entra, google_workspace]
event_categories: [account_management]

detection:
  type: threshold
  window_minutes: 60
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [AttachRolePolicy, PutRolePolicy, AttachUserPolicy,
              GRANT_ADMIN_PRIVILEGE, privilege_escalation,
              Add_member_to_role, AddUserToGroup]
    - field: outcome
      operator: eq
      value: success
  count_min: 1

  filters:
    - field: target_resource
      operator: contains_any
      value: [Admin, Administrator, PowerUser, SecurityAdmin,
              GlobalAdministrator, CompanyAdministrator]

alert:
  title: "Privilege Escalation — {{actor_user_id}} → {{target_resource}}"
  description: >
    User {{actor_user_id}} granted elevated permissions
    ({{target_resource}}) to {{target_entity}}.
  priority: P2
  recommended_actions:
    - "Verify this was an authorized change via your change management process"
    - "Review the full IAM/RBAC change history for this user"
    - "If unauthorized, immediately revoke the elevated permissions"
    - "Review what the escalated account did after receiving elevated access"

confidence_score: 0.85
false_positive_notes: "Authorized IT operations — use change management tickets to correlate."

