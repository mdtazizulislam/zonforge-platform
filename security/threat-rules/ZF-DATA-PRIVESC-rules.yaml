# ZF-DATA-001: Unusual Mass Data Download
id: ZF-DATA-001
name: Unusual Mass File Download
description: >
  A user downloads an abnormally large volume of files or data
  in a short time window, significantly exceeding their historical
  baseline. A key early indicator of data exfiltration.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0010
      name: Exfiltration
  techniques:
    - id: T1530
      name: Data from Cloud Storage Object
    - id: T1213
      name: Data from Information Repositories
  coverage_level: full

source_types: [google_workspace, m365_entra]
event_categories: [file_access]

detection:
  type: anomaly_threshold
  window_minutes: 60
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [file_download, download, GetObject]
    - field: outcome
      operator: eq
      value: success

  aggregate:
    count_min: 50
    or_volume_mb_min: 500

  anomaly_check:
    metric: download_count_per_hour
    std_dev_threshold: 3.0

alert:
  title: "Mass Data Download — {{actor_user_id}}"
  description: >
    User {{actor_user_id}} downloaded {{event_count}} files
    ({{data_volume_mb}}MB) in {{window_minutes}} minutes —
    significantly above their baseline behavior.
  priority: P2
  recommended_actions:
    - "Determine if this download was authorized (backup, legitimate project)"
    - "Review which files/folders were downloaded"
    - "Check if data was moved to external storage or sent externally"
    - "Consider whether the user has submitted resignation or is under investigation"

confidence_score: 0.78
false_positive_notes: "Legitimate bulk exports for backup, migration, or reporting tasks."

