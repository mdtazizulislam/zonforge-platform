# ZF-API-001: Unusual API Token Usage Pattern
id: ZF-API-001
name: Unusual API Token Usage Pattern
description: >
  An API token is used from a new IP address with anomalously high
  request volume or from an unusual endpoint pattern. May indicate
  a stolen API token being used by an adversary.
severity: medium
enabled: true

mitre:
  tactics:
    - id: TA0006
      name: Credential Access
  techniques:
    - id: T1550
      name: Use Alternate Authentication Material
      sub_techniques:
        - id: T1550.001
          name: Application Access Token
  coverage_level: full

source_types: [api_gateway_aws, api_gateway_kong, generic_webhook]
event_categories: [api_call]

detection:
  type: anomaly_correlation
  window_minutes: 60
  group_by: [actor_user_id]

  conditions:
    - field: event_category
      operator: eq
      value: api_call
    - field: outcome
      operator: eq
      value: success

  anomaly_checks:
    - metric: api_calls_per_hour
      std_dev_threshold: 3.0
    - metric: new_ip_for_token
      is_new: true
    - metric: unique_endpoints_per_hour
      threshold_min: 20

  require_anomaly_count: 2

alert:
  title: "Unusual API Token Activity — {{actor_user_id}}"
  description: >
    API token for {{actor_user_id}} shows anomalous usage:
    {{anomaly_details}}. This may indicate a stolen token.
  priority: P2
  recommended_actions:
    - "Verify if the token owner is responsible for this activity"
    - "Check if the token was recently shared or may have been exposed"
    - "Revoke and reissue the token if origin cannot be confirmed"
    - "Review what API endpoints were accessed with this token"

confidence_score: 0.75
false_positive_notes: "Automated jobs running from new infrastructure, legitimate load testing."

