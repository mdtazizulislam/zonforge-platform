# ZF-AUTH-006: Login from New Country
id: ZF-AUTH-006
name: Successful Login from Never-Before-Seen Country
description: >
  A user successfully logs in from a country they have never
  previously accessed from. This is a moderate-confidence indicator
  of account compromise, especially when combined with other signals.
severity: medium
enabled: true

mitre:
  tactics:
    - id: TA0001
      name: Initial Access
  techniques:
    - id: T1078
      name: Valid Accounts
      sub_techniques:
        - id: T1078.004
          name: Cloud Accounts
  coverage_level: partial

source_types: [m365_entra, google_workspace, aws_cloudtrail]
event_categories: [authentication]

detection:
  type: baseline_deviation
  window_minutes: 30
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [login_success]
    - field: outcome
      operator: eq
      value: success
    - field: actor_ip_country
      operator: not_in_baseline
      baseline_metric: login_countries
      baseline_days: 30
  count_min: 1

alert:
  title: "Login from New Country — {{actor_user_id}} from {{actor_ip_country}}"
  description: >
    User {{actor_user_id}} logged in from {{actor_ip_country}},
    a country not seen in their 30-day login history.
  priority: P3
  recommended_actions:
    - "Verify with the user if they are traveling or using a VPN"
    - "If unexpected, consider this a potential account compromise"
    - "Review all activity in this session"

confidence_score: 0.65
false_positive_notes: "Travel, VPN, and remote work are common causes. This rule is most valuable as a contributing signal rather than standalone alert."
