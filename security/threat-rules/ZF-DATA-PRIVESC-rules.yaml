# ZF-AWS-001: AWS Root Account Login
id: ZF-AWS-001
name: AWS Root Account Console Login
description: >
  The AWS account root user logged into the management console.
  AWS best practice requires that the root account is never used
  for routine operations. Any root login should be treated as a
  security incident until proven otherwise.
severity: critical
enabled: true

mitre:
  tactics:
    - id: TA0001
      name: Initial Access
    - id: TA0004
      name: Privilege Escalation
  techniques:
    - id: T1078
      name: Valid Accounts
      sub_techniques:
        - id: T1078.004
          name: Cloud Accounts
  coverage_level: full

source_types: [aws_cloudtrail]
event_categories: [authentication]

detection:
  type: threshold
  window_minutes: 5
  group_by: [tenant_id]

  conditions:
    - field: event_action
      operator: eq
      value: ConsoleLogin
    - field: actor_user_type
      operator: eq
      value: admin
    - field: metadata.awsUserIdentityType
      operator: eq
      value: Root
  count_min: 1

alert:
  title: "CRITICAL: AWS Root Account Login Detected"
  description: >
    The AWS root account for this environment logged into the
    management console from IP {{actor_ip}} at {{event_time}}.
    This is a critical security event.
  priority: P1
  recommended_actions:
    - "Immediately verify with your AWS account owner if this was authorized"
    - "If not authorized, assume account compromise — activate AWS incident response"
    - "Rotate root account credentials immediately"
    - "Enable MFA on root account if not already enabled"
    - "Review all AWS API calls made in the 30 minutes following this login"

confidence_score: 0.98
false_positive_notes: "Very rare — root logins should essentially never occur. Treat every trigger as P1."

