# ZF-AUTH-007: Known Leaked Credential Login
id: ZF-AUTH-007
name: Login with Known Leaked Credential
description: >
  Microsoft Entra ID or Google Workspace reports a login attempt
  using credentials that have been found in known data breach
  dumps. This is a direct signal from the identity provider's
  threat intelligence that these credentials are exposed.
severity: critical
enabled: true

mitre:
  tactics:
    - id: TA0006
      name: Credential Access
  techniques:
    - id: T1110
      name: Brute Force
      sub_techniques:
        - id: T1110.004
          name: Credential Stuffing
  coverage_level: full

source_types: [m365_entra, google_workspace]
event_categories: [authentication]

detection:
  type: threshold
  window_minutes: 5
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [login_success, login_failed, leaked_credential_login,
              suspicious_login, LEAKED_PASSWORD_LOGIN,
              account_disabled_hijacked]
    - field: metadata.riskLevel
      operator: in
      value: [high, atRisk]
  count_min: 1

  or_conditions:
    - field: event_action
      operator: in
      value: [leaked_credential_login, LEAKED_PASSWORD_LOGIN]
    - field: metadata.riskEventType
      operator: in
      value: [leakedCredentials, passwordSpray]

alert:
  title: "CRITICAL: Leaked Credential Detected — {{actor_user_id}}"
  description: >
    {{actor_user_id}}'s credentials appear in known data breach
    dumps. Login risk level: {{risk_level}}.
  priority: P1
  recommended_actions:
    - "IMMEDIATE: Force password reset for {{actor_user_id}}"
    - "Revoke all active sessions for this user"
    - "Enable additional verification requirements until password is reset"
    - "Check for any unauthorized activity in the account"
    - "Educate user on credential hygiene and password manager usage"

confidence_score: 0.96
false_positive_notes: "Very low — this signal comes directly from Microsoft/Google's threat intelligence. Treat as confirmed until proven otherwise."
