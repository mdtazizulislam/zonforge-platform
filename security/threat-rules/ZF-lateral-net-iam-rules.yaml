# ZF-NET-001: DNS Beaconing Pattern
id: ZF-NET-001
name: DNS Beaconing — Regular-Interval DNS Queries
description: >
  High-frequency DNS queries to the same domain at suspiciously
  regular intervals from a single host. This pattern is characteristic
  of malware Command & Control (C2) communication using DNS
  as a covert channel.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0011
      name: Command and Control
  techniques:
    - id: T1071
      name: Application Layer Protocol
      sub_techniques:
        - id: T1071.004
          name: DNS
    - id: T1568
      name: Dynamic Resolution
  coverage_level: full

source_types: [generic_webhook, generic_syslog]
event_categories: [network]

detection:
  type: pattern
  window_minutes: 60
  group_by: [actor_ip, target_resource]

  conditions:
    - field: event_category
      operator: eq
      value: network
    - field: event_action
      operator: in
      value: [dns_query, dns_lookup]
    - field: target_resource
      operator: is_same_domain

  pattern_check:
    type: regularity
    min_events: 10
    max_interval_std_dev_seconds: 30   # very regular = low std dev
    max_interval_mean_seconds: 300     # every 5 minutes or faster

alert:
  title: "DNS Beaconing Detected — {{actor_ip}} → {{target_domain}}"
  description: >
    Host {{actor_ip}} sent {{event_count}} DNS queries to
    {{target_domain}} at regular ~{{interval_mean_seconds}}s
    intervals over 60 minutes. Possible C2 communication.
  priority: P2
  recommended_actions:
    - "Isolate the source host for forensic investigation"
    - "Block the target domain at the DNS level"
    - "Check threat intelligence for {{target_domain}}"
    - "Run endpoint scan on {{actor_ip}} for malware"

confidence_score: 0.72
false_positive_notes: "Legitimate polling applications (monitoring agents, NTP, update checkers) can exhibit regular DNS patterns."

