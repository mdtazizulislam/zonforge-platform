# ZF-EMAIL-001: Email Auto-Forward Rule to External Domain
id: ZF-EMAIL-001
name: Email Auto-Forwarding Rule Created to External Domain
description: >
  A user creates an email auto-forwarding rule that sends mail
  to an external domain. This is a classic technique used by
  insider threats and attackers who have compromised an email
  account to exfiltrate information silently.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0009
      name: Collection
    - id: TA0010
      name: Exfiltration
  techniques:
    - id: T1114
      name: Email Collection
      sub_techniques:
        - id: T1114.003
          name: Email Forwarding Rule
  coverage_level: full

source_types: [m365_entra, google_workspace]
event_categories: [account_management]

detection:
  type: threshold
  window_minutes: 30
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [email_forward_rule_created, CREATE_FORWARDING_RULE,
              New-InboxRule, Set-InboxRule, UpdateInboxRules]
    - field: outcome
      operator: eq
      value: success
    - field: metadata.forwardToExternal
      operator: eq
      value: true
  count_min: 1

alert:
  title: "External Email Forward Rule — {{actor_user_id}}"
  description: >
    {{actor_user_id}} created an email forwarding rule to
    external domain {{forward_target_domain}} at {{event_time}}.
  priority: P2
  recommended_actions:
    - "Verify if the user authorized this forwarding rule"
    - "If unauthorized, delete the rule immediately"
    - "Review what emails may have been forwarded"
    - "Check if the target email address belongs to the user"

confidence_score: 0.85
false_positive_notes: "Authorized email forwarding for role coverage during vacation/leave."

