# ZF-LATERAL-001: Lateral Movement via Authentication Spread
id: ZF-LATERAL-001
name: Lateral Movement — Authentication Spread Across Assets
description: >
  A single source identity or IP authenticates to multiple distinct
  internal assets within a short time window. This pattern is
  consistent with lateral movement reconnaissance or automated
  credential spraying across internal resources.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0008
      name: Lateral Movement
  techniques:
    - id: T1021
      name: Remote Services
      sub_techniques:
        - id: T1021.001
          name: Remote Desktop Protocol
        - id: T1021.004
          name: SSH
  coverage_level: partial

source_types: [aws_cloudtrail, generic_syslog, generic_webhook]
event_categories: [authentication, network]

detection:
  type: threshold
  window_minutes: 30
  group_by: [actor_user_id, actor_ip]

  conditions:
    - field: event_action
      operator: in
      value: [login_success, AssumeRole, ssh_login, rdp_login,
              GetObjectAcl, ListBuckets]
    - field: target_asset_id
      operator: is_distinct

  aggregate:
    distinct_target_count_min: 5
    window_minutes: 30

alert:
  title: "Lateral Movement — {{actor_ip}} accessed {{distinct_target_count}} assets"
  description: >
    {{actor_user_id}} ({{actor_ip}}) authenticated to
    {{distinct_target_count}} distinct assets within 30 minutes.
    This pattern is consistent with lateral movement.
  priority: P2
  recommended_actions:
    - "Investigate each asset accessed — check for privilege escalation or data access"
    - "Determine if this is legitimate automation or an adversary"
    - "Block the source IP if lateral movement is confirmed"
    - "Check for credential dumping on the source system"

confidence_score: 0.75
false_positive_notes: "System management tools, deployment automation, and monitoring agents access multiple systems routinely."

