# ZF-IAM-002: New Admin Account Created
id: ZF-IAM-002
name: New Administrative Account Created
description: >
  A new user account with administrative privileges is created.
  Attackers who gain initial access often create backdoor admin
  accounts for persistence. Every new admin account creation
  should be reviewed.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0003
      name: Persistence
  techniques:
    - id: T1136
      name: Create Account
      sub_techniques:
        - id: T1136.003
          name: Cloud Account
  coverage_level: full

source_types: [m365_entra, google_workspace, aws_cloudtrail]
event_categories: [account_management]

detection:
  type: threshold
  window_minutes: 30
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [user_created, CREATE_USER, CreateUser, admin_created_new_admin]
    - field: outcome
      operator: eq
      value: success

  and_conditions:
    - field: event_action
      operator: in
      value: [GRANT_ADMIN_PRIVILEGE, AttachRolePolicy, privilege_escalation,
              Add_member_to_role]
      within_minutes: 10
      for_same_target: true
  count_min: 1

alert:
  title: "New Admin Account Created — by {{actor_user_id}}"
  description: >
    {{actor_user_id}} created a new account {{target_entity}}
    with administrative privileges at {{event_time}}.
  priority: P2
  recommended_actions:
    - "Verify this account creation was authorized via your provisioning process"
    - "Confirm the new account owner and their business need for admin access"
    - "If unauthorized, disable the account and investigate how it was created"

confidence_score: 0.82
false_positive_notes: "Authorized IT provisioning. Cross-reference with HR onboarding and IT service desk tickets."

