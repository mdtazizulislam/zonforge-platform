# ZF-OAUTH-001: Suspicious OAuth Application Grant
id: ZF-OAUTH-001
name: Suspicious OAuth Application Consent Grant
description: >
  A user grants OAuth consent to an application requesting broad
  permissions (Mail.Read, Files.ReadWrite.All, etc.) or consents
  to a newly registered application. Common vector for phishing
  and OAuth token theft attacks.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0001
      name: Initial Access
    - id: TA0006
      name: Credential Access
  techniques:
    - id: T1566
      name: Phishing
      sub_techniques:
        - id: T1566.002
          name: Spearphishing Link
    - id: T1550
      name: Use Alternate Authentication Material
  coverage_level: partial

source_types: [m365_entra, google_workspace]
event_categories: [authentication, account_management]

detection:
  type: threshold
  window_minutes: 30
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [oauth_consent_granted, AUTHORIZE_API_CLIENT_ACCESS,
              Consent_to_application, oauth_token_authorized]
    - field: outcome
      operator: eq
      value: success
    - field: metadata.requestedScopes
      operator: contains_any
      value: [Mail.Read, Mail.ReadWrite, Files.ReadWrite.All,
              Directory.ReadWrite.All, User.ReadWrite.All,
              full_account_access]
  count_min: 1

alert:
  title: "Broad OAuth Permission Granted — {{actor_user_id}}"
  description: >
    User {{actor_user_id}} granted OAuth consent to application
    requesting sensitive permissions: {{requested_scopes}}.
  priority: P2
  recommended_actions:
    - "Verify the OAuth application is legitimate and approved"
    - "Review the application publisher and OAuth consent screen"
    - "If suspicious, revoke OAuth grant immediately"
    - "Audit what data the application accessed after the grant"

confidence_score: 0.78
false_positive_notes: "Legitimate SaaS integrations request broad permissions. Build an approved application allowlist."

