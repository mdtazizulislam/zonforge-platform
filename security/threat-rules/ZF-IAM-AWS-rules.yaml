# ZF-AWS-002: Mass S3 Object Deletion
id: ZF-AWS-002
name: Mass S3 Object Deletion
description: >
  A large number of S3 objects are deleted in a short time window
  by a single identity. This may indicate a destructive attack,
  ransomware encrypting cloud storage, or accidental mass deletion.
severity: critical
enabled: true

mitre:
  tactics:
    - id: TA0040
      name: Impact
  techniques:
    - id: T1485
      name: Data Destruction
    - id: T1490
      name: Inhibit System Recovery
  coverage_level: full

source_types: [aws_cloudtrail]
event_categories: [file_access]

detection:
  type: threshold
  window_minutes: 15
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [bulk_file_delete, DeleteObject, DeleteObjects]
    - field: outcome
      operator: eq
      value: success

  aggregate:
    count_min: 100

alert:
  title: "Mass S3 Deletion — {{actor_user_id}} deleted {{event_count}} objects"
  description: >
    {{actor_user_id}} deleted {{event_count}} S3 objects across
    buckets {{affected_buckets}} in {{window_minutes}} minutes.
  priority: P1
  recommended_actions:
    - "Check if S3 versioning is enabled — recovery may be possible"
    - "Identify which buckets and objects were affected"
    - "Check if this was an authorized maintenance operation"
    - "If unauthorized, contain the identity and assess data loss"
    - "Enable S3 Object Lock on critical buckets to prevent future mass deletion"

confidence_score: 0.88
false_positive_notes: "Authorized cleanup scripts and migration jobs. Tune bucket exclusion list for known automation accounts."

