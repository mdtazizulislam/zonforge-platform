# ZF-AWS-003: IAM Wildcard Policy Attachment
id: ZF-AWS-003
name: IAM Wildcard or AdministratorAccess Policy Attached
description: >
  A user attaches an IAM policy with wildcard permissions (Action: *)
  or the AWS AdministratorAccess managed policy to a role, user, or
  group. This is a clear indicator of privilege escalation or
  misconfiguration that creates a path to full AWS account takeover.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0004
      name: Privilege Escalation
    - id: TA0003
      name: Persistence
  techniques:
    - id: T1098
      name: Account Manipulation
      sub_techniques:
        - id: T1098.001
          name: Additional Cloud Credentials
  coverage_level: full

source_types: [aws_cloudtrail]
event_categories: [account_management]

detection:
  type: threshold
  window_minutes: 30
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [AttachRolePolicy, AttachUserPolicy, AttachGroupPolicy,
              PutRolePolicy, PutUserPolicy, PutGroupPolicy]
    - field: outcome
      operator: eq
      value: success
    - field: metadata.awsRequestParams.policyArn
      operator: contains_any
      value: [AdministratorAccess, PowerUserAccess, arn:aws:iam::aws:policy/AdministratorAccess]
  count_min: 1

alert:
  title: "IAM AdministratorAccess Granted — {{actor_user_id}}"
  description: >
    {{actor_user_id}} attached AdministratorAccess or wildcard policy
    to {{target_resource}} at {{event_time}}.
  priority: P2
  recommended_actions:
    - "Verify this was an authorized change via your change management process"
    - "Review who the target principal is and whether this level of access is justified"
    - "If unauthorized, remove the policy attachment immediately"
    - "Audit all actions taken by the newly-privileged principal"

confidence_score: 0.87
false_positive_notes: "Authorized IAM admin operations. Cross-reference with change management tickets."
