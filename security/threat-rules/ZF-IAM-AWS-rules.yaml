# ZF-RANSOMWARE-001: Shadow Copy Deletion (Ransomware Pre-cursor)
id: ZF-RANSOMWARE-001
name: Volume Shadow Copy Deletion Detected
description: >
  A process deletes Windows Volume Shadow Copies (VSS), which is
  one of the most reliable early indicators of ransomware activity.
  Ransomware deletes shadow copies to prevent recovery before
  beginning file encryption. This is an extremely high-confidence
  critical indicator.
severity: critical
enabled: true

mitre:
  tactics:
    - id: TA0040
      name: Impact
  techniques:
    - id: T1490
      name: Inhibit System Recovery
  coverage_level: full

source_types: [aws_cloudtrail, generic_webhook, edr_crowdstrike, edr_sentinelone]
event_categories: [cloud_resource, process_activity]

detection:
  type: threshold
  window_minutes: 15
  group_by: [tenant_id]

  conditions:
    - field: event_action
      operator: in
      value: [shadow_copy_deletion, DeleteSnapshot, DeleteVolume,
              vssadmin_delete_shadows, wmic_shadowcopy_delete,
              StopLogging, DeleteTrail]
  count_min: 1

alert:
  title: "CRITICAL: Shadow Copy Deletion — Possible Ransomware"
  description: >
    Shadow copy or backup deletion detected on {{target_asset_id}}
    at {{event_time}}. This is a critical early-stage ransomware
    indicator. Immediate response required.
  priority: P1
  recommended_actions:
    - "IMMEDIATE: Isolate the affected system from the network"
    - "Activate your ransomware incident response playbook"
    - "Check for mass file rename/encryption on the same system"
    - "Identify the process responsible and quarantine"
    - "Verify backup integrity from an isolated backup system"

confidence_score: 0.95
false_positive_notes: "Legitimate backup maintenance or storage optimization. Extremely rare. Always treat as P1 until ruled out."

