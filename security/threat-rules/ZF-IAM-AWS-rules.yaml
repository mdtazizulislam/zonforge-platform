# ZF-IAM-001: Service Account Interactive Login
id: ZF-IAM-001
name: Service Account Interactive Login
description: >
  A service account or machine identity performs an interactive
  (human-style) login. Service accounts should authenticate only
  via API keys or service-to-service tokens, never interactively.
  This indicates either service account credential theft or misconfiguration.
severity: high
enabled: true

mitre:
  tactics:
    - id: TA0003
      name: Persistence
    - id: TA0004
      name: Privilege Escalation
  techniques:
    - id: T1078
      name: Valid Accounts
      sub_techniques:
        - id: T1078.003
          name: Local Accounts
  coverage_level: full

source_types: [m365_entra, google_workspace, aws_cloudtrail]
event_categories: [authentication]

detection:
  type: threshold
  window_minutes: 60
  group_by: [actor_user_id]

  conditions:
    - field: event_action
      operator: in
      value: [login_success, ConsoleLogin]
    - field: outcome
      operator: eq
      value: success
    - field: actor_user_type
      operator: eq
      value: service_account

  filters:
    - field: actor_user_email
      operator: contains_any
      value: [svc-, service-, sa-, automation-, bot-, system-,
              .svc@, -sa@, _svc@]
  count_min: 1

alert:
  title: "Service Account Interactive Login — {{actor_user_id}}"
  description: >
    Service account {{actor_user_id}} performed an interactive
    login from {{actor_ip}} at {{event_time}}. Service accounts
    should not log in interactively.
  priority: P2
  recommended_actions:
    - "Verify no human is using service account credentials directly"
    - "Rotate service account credentials immediately"
    - "Review what actions were performed in this session"
    - "Enforce service account policy: no interactive logins"

confidence_score: 0.88
false_positive_notes: "Misconfigured automation scripts using interactive auth. Should be very rare."

